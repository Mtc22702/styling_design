<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopX – Parallax eCommerce</title>

    <style>
        /* =========================
   RESET + BAZĂ
   ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        /* =========================
   NAVBAR
   ========================= */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
        }

        /* =========================
   SECTIUNI PARALLAX
   ========================= */
        .parallax {
            min-height: 100vh;
            background-attachment: fixed;
            /* EFECT PARALLAX */
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        /* Hero section */
        .hero {
            background-image: url("./img/ap3_800.jpg");
        }

        .hero h1 {
            font-size: 3rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 1.5rem;
            border-radius: 10px;
        }

        /* =========================
   SECTIUNI NORMALE
   ========================= */
        .section {
            padding: 4rem 2rem;
            background: #f5f5f5;
        }

        .section h2 {
            text-align: center;
            margin-bottom: 2rem;
        }

        /* =========================
   PRODUSE
   ========================= */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: auto;
        }

        .product {
            background: white;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .product img {
            max-width: 100%;
            border-radius: 10px;
        }

        .product h3 {
            margin: 1rem 0;
        }

        .product button {
            background: #000;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            cursor: pointer;
        }

        /* =========================
   PARALLAX BANNER
   ========================= */
        .banner {
            background-image: url("./img/ap3_480.jpg");
            min-height: 60vh;
        }

        /* =========================
   CTA
   ========================= */
        .cta {
            background: #000;
            color: white;
            text-align: center;
            padding: 4rem 2rem;
        }

        .cta button {
            margin-top: 1rem;
            padding: 1rem 2rem;
            background: white;
            color: black;
            border: none;
            font-size: 1rem;
            cursor: pointer;
        }

        /* =========================
   FOOTER
   ========================= */
        footer {
            background: #111;
            color: #aaa;
            text-align: center;
            padding: 2rem;
        }

        /* =========================
   RESPONSIVE (mobile)
   ========================= */
        @media (max-width: 768px) {
            .parallax {
                background-attachment: scroll;
                /* fallback mobil */
            }

            .hero h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <strong>ShopX</strong>
        <div>
            <a href="#">Home</a>
            <a href="#">Produse</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <!-- HERO PARALLAX -->
    <section class="parallax hero">
        <h1>Produse Premium<br>Experiență Unică</h1>
    </section>

    <!-- PRODUSE -->
    <section class="section">
        <h2>Produsele noastre</h2>
        <div class="products">
            <div class="product">
                <img src="./img/ap3_480.jpg" alt="">
                <h3>Produs 1</h3>
                <p>Descriere scurtă produs</p>
                <button>Cumpără</button>
            </div>

            <div class="product">
                <img src="./img/ap3_480.jpg" alt="">
                <h3>Produs 2</h3>
                <p>Descriere scurtă produs</p>
                <button>Cumpără</button>
            </div>

            <div class="product">
                <img src="./img/ap3_480.jpg" alt="">
                <h3>Produs 3</h3>
                <p>Descriere scurtă produs</p>
                <button>Cumpără</button>
            </div>
        </div>
    </section>

    <!-- PARALLAX BANNER -->
    <section class="parallax banner">
        <h1>Reduceri până la 50%</h1>
    </section>

    <!-- CTA -->
    <section class="cta">
        <h2>Abonează-te pentru oferte exclusive</h2>
        <button>Abonare</button>
    </section>

    <!-- FOOTER -->
    <footer>
        © 2026 ShopX – Toate drepturile rezervate
    </footer>

</body>

</html>
